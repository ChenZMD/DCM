<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全球资金流动 · 可交互世界地图</title>
<script src="vendor/echarts.min.js"></script>
<style>
  :root{
    --bg-1:#070d22; --bg-2:#0b1733; --bg-3:#101d3e;
    --panel:rgba(15,25,52,0.72);
    --border:rgba(120,160,220,0.16);
    --border-strong:rgba(120,170,230,0.38);
    --text:#eaf1fb; --muted:#9fb2cc; --faint:#6f86a8;
    --accent:#4fd1e3; --accent-2:#5b9bff; --gold:#ffd666; --good:#3fd29a; --warn:#ff9d6b; --danger:#ff6f86;
    --base:#172339; --base-border:#2c3c5e;
    --ease:cubic-bezier(0.22,0.61,0.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:radial-gradient(1200px 700px at 78% -10%, rgba(91,155,255,0.18), transparent 60%),
               radial-gradient(900px 600px at 10% 110%, rgba(79,209,227,0.14), transparent 55%),
               linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 45%,var(--bg-3) 100%);
    background-attachment:fixed; min-height:100vh; overflow-x:hidden;
  }
  /* 顶部 */
  header.top{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    padding:16px 26px;border-bottom:1px solid var(--border);
    background:rgba(8,14,32,0.55);backdrop-filter:blur(12px);position:relative;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:.5px;}
  .brand .sub{font-size:11px;color:var(--faint);margin-top:2px;}
  .search{position:relative;}
  .search .ic{
    position:absolute;left:13px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none;
  }
  .search input{
    width:260px;max-width:60vw;padding:9px 14px 9px 38px;border-radius:22px;
    border:1px solid var(--border-strong);background:rgba(10,18,38,0.7);color:var(--text);font-size:13px;outline:none;
    transition:.2s var(--ease);
  }
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,209,227,0.15);}
  .suggest{
    position:absolute;top:46px;left:0;right:0;background:rgba(10,18,38,0.97);border:1px solid var(--border-strong);
    border-radius:12px;overflow:hidden;z-index:30;box-shadow:0 18px 50px rgba(0,0,0,0.5);max-height:320px;overflow-y:auto;
  }
  .suggest div{padding:10px 14px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(120,160,220,0.08);}
  .suggest div:hover{background:rgba(79,209,227,0.12);}
  .suggest div .en{color:var(--faint);font-size:11px;}

  main{display:flex;gap:0;align-items:stretch;min-height:calc(100vh - 120px);}
  .map-wrap{flex:1;position:relative;min-height:62vh;}
  #map{width:100%;height:100%;min-height:420px;}

  /* 指标 Tab */
  .metrics{
    position:absolute;top:16px;left:16px;z-index:6;display:flex;gap:8px;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:7px;backdrop-filter:blur(8px);
  }
  .metrics button{
    border:none;background:transparent;color:var(--muted);font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.18s var(--ease);white-space:nowrap;
  }
  .metrics button:hover{color:var(--text);}
  .metrics button.active{background:linear-gradient(90deg,rgba(79,209,227,.22),rgba(91,155,255,.22));color:#fff;box-shadow:inset 0 0 0 1px rgba(79,209,227,.4);}

  /* 动态图例 */
  .legend{
    position:absolute;left:16px;bottom:16px;z-index:6;background:var(--panel);
    border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);
    backdrop-filter:blur(8px);min-width:190px;
  }
  .legend .lt{font-size:11px;color:var(--faint);margin-bottom:7px;letter-spacing:.4px;}
  .legend .bar-grad{height:9px;border-radius:5px;margin:4px 0 5px;background:linear-gradient(90deg,#16243f,#234b8a,#2f8fd0,#54d6e8,#ffd666);}
  .legend .scale{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);}
  .legend .chip{display:flex;align-items:center;gap:6px;margin-top:4px;}
  .legend .chip i{width:11px;height:11px;border-radius:3px;display:inline-block;}

  .reset{
    position:absolute;right:16px;bottom:16px;z-index:6;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;cursor:pointer;
    background:var(--panel);border:1px solid var(--border-strong);color:var(--accent);font-size:12px;backdrop-filter:blur(8px);transition:.18s var(--ease);
  }
  .reset:hover{background:rgba(79,209,227,0.16);}
  .reset .ric{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* 侧栏（城市信息 + 新闻面板；排名榜已移除，新闻面板 flex:1 填充其腾出的区域） */
  .side{
    width:372px;flex-shrink:0;border-left:1px solid var(--border);
    background:rgba(8,14,32,0.5);padding:20px;
    display:flex;flex-direction:column;min-height:0;overflow:hidden;
  }
  .side h2{font-size:16px;margin-bottom:4px;color:#bfe6f5;display:flex;align-items:center;gap:8px;}
  /* 节点呼吸动画 */
  @keyframes nodePulse{0%{box-shadow:0 0 0 0 rgba(255,214,102,0.7);}70%{box-shadow:0 0 0 14px rgba(255,214,102,0);}100%{box-shadow:0 0 0 0 rgba(255,214,102,0);}}
  .node-pulse{animation:nodePulse 1.8s ease-out infinite;}

  /* 排名榜样式已移除：2D 视图不再展示「全球金融中心排名」列表（需求：删除排名板块，新闻面板接管其空间） */
  /* .src 仅用于国家详情的数据来源脚注（非排名），保留基础样式 */
  .src{font-size:11px;color:var(--faint);line-height:1.6;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}

  /* 移动端底部抽屉 */
  .drawer-mask{display:none;}
  @media (max-width:900px){
    main{flex-direction:column;}
    .side{width:100%;border-left:none;border-top:1px solid var(--border);max-height:none;}
    .map-wrap{min-height:56vh;}
    .side{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:40;max-height:64vh;border-top:1px solid var(--border-strong);
      border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,0.55);transform:translateY(100%);transition:transform .28s var(--ease);}
    .side.open{transform:translateY(0);}
    .drawer-mask{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:35;opacity:0;pointer-events:none;transition:opacity .28s var(--ease);}
    .drawer-mask.open{opacity:1;pointer-events:auto;}
    .side .close{display:block;}
  }
  .side .close{display:none;position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
  .errbox{display:flex;align-items:center;justify-content:center;height:100%;color:#ffb3b3;font-size:14px;text-align:center;padding:30px;line-height:1.8;}

  /* ===== 全球金融中心新闻板块（与 3D 地球视图统一视觉/交互） ===== */
  .news-block{ margin-top:18px; padding-top:16px; border-top:1px solid var(--border);
    flex:1; min-height:0; display:flex; flex-direction:column; }
  .news-panel-head{ margin-bottom:14px; flex-shrink:0; }
  .news-panel-city{ font-size:18px; font-weight:800; color:var(--text); letter-spacing:-.3px; }
  .news-panel-sub{ font-size:11px; color:var(--faint); margin-top:2px; letter-spacing:.3px; }
  .news-panel-meta{ font-size:12px; color:var(--faint); margin-top:5px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .news-panel-live{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:1px 7px; border-radius:999px; background:rgba(255,92,124,.16); color:var(--danger); }
  .news-panel-live .live-dot{ width:5px; height:5px; border-radius:50%; background:var(--danger); animation:pulse 1.2s ease-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
  .news-panel-list{ display:flex; flex-direction:column; gap:8px; transition:opacity .3s ease, transform .3s ease;
    flex:1; min-height:0; overflow-y:auto; padding-right:4px; }
  .news-panel-list.leaving{ opacity:0; transform:translateY(-8px); }
  .news-panel-list.entering{ opacity:0; transform:translateY(8px); }
  .news-item{ padding:12px 14px; border-radius:10px; background:rgba(142,167,192,.06); border:1px solid var(--border); cursor:default; transition:all .22s ease; }
  .news-item:hover{ background:rgba(79,209,227,.1); border-color:rgba(79,209,227,.5); transform:translateX(-3px); }
  .news-item .news-title{ font-size:13px; font-weight:600; color:var(--text); line-height:1.55; margin-bottom:6px; }
  .news-item .news-meta{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--faint); }
  .news-tag{ display:inline-block; font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; letter-spacing:.3px; }
  .news-tag.hot{ background:rgba(255,150,100,.16); color:var(--warn); }
  .news-tag.live{ background:rgba(255,92,124,.18); color:var(--danger); }
  .news-tag.policy{ background:rgba(59,130,246,.14); color:#7da5e8; }
  .news-tag.finance{ background:rgba(59,130,246,.14); color:#7da5e8; }
  .news-tag.industry{ background:rgba(180,160,255,.14); color:#b4a0ff; }
  .news-tag.energy{ background:rgba(255,170,50,.14); color:var(--warn); }
  .news-tag.alert{ background:rgba(255,92,124,.18); color:var(--danger); }
  .news-tag.update{ background:rgba(54,224,160,.14); color:var(--good); }
  .news-tag.trade{ background:rgba(54,224,160,.14); color:var(--good); }
  .news-tag.resource{ background:rgba(255,170,50,.14); color:var(--warn); }
  /* V3.0 维度标签：10 个宏观维度专属色卡（与重要性标签组成双标签） */
  .news-tags-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
  .dimension-tag{ display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:500; color:#fff; line-height:1.5; letter-spacing:.3px; }
  .dimension-tag.politics{ background:#EF4444; }
  .dimension-tag.geopolitics{ background:#8B5CF6; } /* 紫色 - 用户确认按 spec 用（项目 P0 原禁紫，此处放宽） */
  .dimension-tag.monetary{ background:#F97316; }
  .dimension-tag.supply-chain{ background:#14B8A6; }
  .dimension-tag.free-trade{ background:#22C55E; }
  .dimension-tag.tech{ background:#3B82F6; }
  .dimension-tag.energy{ background:#D97706; }
  .dimension-tag.industry{ background:#6366F1; }
  .dimension-tag.crypto{ background:#EAB308; }
  .dimension-tag.macro{ background:#6B7280; }
  /* 维度筛选条 */
  .news-filter{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 14px; flex-shrink:0; }
  .news-filter .chip{ font-size:11px; padding:3px 10px; border-radius:999px; border:1px solid var(--border); color:var(--faint); cursor:pointer; transition:all .16s ease; background:transparent; }
  .news-filter .chip:hover{ border-color:rgba(79,209,227,.5); color:var(--accent); }
  .news-filter .chip.active{ background:var(--accent); color:#04121a; border-color:var(--accent); font-weight:600; }
  .news-rank{ font-size:10px; font-weight:700; color:var(--faint); margin-right:6px; }
  .news-item.top{ border-left:2px solid var(--warn); }
  .news-item.top .news-rank{ color:var(--warn); }
  .news-item.top1 .news-rank{ color:var(--danger); }
  .news-panel-foot{ margin-top:16px; text-align:center; font-size:11px; color:var(--faint); letter-spacing:1px; flex-shrink:0; }
  .news-panel-foot::before,.news-panel-foot::after{ content:""; display:inline-block; width:22px; height:1px; background:var(--border); vertical-align:middle; margin:0 10px; }
  .skeleton-item{ padding:12px 14px; border-radius:10px; background:rgba(142,167,192,.06); border:1px solid var(--border); margin-bottom:8px; }
  .skeleton-line{ height:10px; border-radius:5px; margin-bottom:8px; background:linear-gradient(90deg,rgba(142,167,192,.10) 25%,rgba(142,167,192,.22) 37%,rgba(142,167,192,.10) 63%); background-size:400% 100%; animation:skeletonShimmer 1.2s ease-in-out infinite; }
  .skeleton-line.short{ width:55%; }
  .skeleton-line:last-child{ margin-bottom:0; }
  @keyframes skeletonShimmer{ 0%{background-position:100% 0} 100%{background-position:0 0} }
  .city-clock{ color:var(--muted); font-weight:600; }
  .demo-pill{ font-size:10px; font-weight:600; padding:1px 7px; border-radius:999px; background:rgba(142,167,192,.12); color:var(--faint); }
  .realtime-pill{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; padding:1px 7px; border-radius:999px; background:rgba(54,224,160,.14); color:var(--good); }
  .realtime-pill .rt-dot{ width:5px; height:5px; border-radius:50%; background:var(--good); animation:pulse 1.2s ease-out infinite; }
  .news-empty{ text-align:center; color:var(--faint); font-size:13px; line-height:1.8; padding:26px 12px; border:1px dashed var(--border); border-radius:10px; }
  .news-empty small{ display:block; font-size:11px; margin-top:6px; color:var(--faint); opacity:.85; }
  @media (prefers-reduced-motion: reduce){
    .news-item{ transition:none; }
    .news-item:hover{ transform:none; }
    .news-panel-live .live-dot{ animation:none; }
    .news-panel-list{ transition:none; }
    .skeleton-line{ animation:none; }
  }
</style>

<body>
<header class="top">
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>全球资金流动 · 可交互世界地图</h1>
      <div class="sub">点击国家查看跨境资本指标 · 滚轮缩放 / 拖拽平移 · 数据着色随指标切换</div>
    </div>
  </div>
  <div class="search">
    <svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="搜索国家（中/英文，如 中国 / Japan）" autocomplete="off" />
    <div class="suggest" id="suggest" style="display:none"></div>
  </div>
</header>

<main>
  <div class="map-wrap">
    <div id="map"></div>

    <div class="metrics" id="metrics">
      <button data-m="fdi" class="active">跨境资本净流入</button>
      <button data-m="gdp">经济总量 GDP</button>
      <button data-m="cont">按大洲分布</button>
    </div>

    <div class="legend" id="legend"></div>
    <button class="reset" id="resetBtn">
      <svg class="ric" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 2.6-6.35"/><polyline points="3 3 3 8 8 8"/></svg>
      <span>重置视图</span>
    </button>
  </div>

  <div class="drawer-mask" id="mask"></div>

  <aside class="side" id="side">
    <button class="close" id="closeBtn">&times;</button>
    <h2 id="sideTitle">全球概览</h2>
    <div id="sideBody"></div>

    <!-- 新闻板块：与 3D 地球视图共用同一套交互（点击节点刷新 / 跨城淡入淡出 / 实时时钟 / 演示数据标注） -->
    <section class="news-block" id="newsBlock">
      <div class="news-panel-head">
        <div class="news-panel-city" id="newsPanelCity">--</div>
        <div class="news-panel-sub" id="newsPanelSub">金融热点 · 按重要度排序</div>
        <div class="news-panel-meta" id="newsPanelMeta">--</div>
      </div>
      <div class="news-filter" id="newsFilter"></div>
      <div class="news-panel-list" id="newsPanelList"></div>
      <div class="news-panel-foot" id="newsPanelFoot">演示数据</div>
    </section>
  </aside>
</main>

<footer style="padding:12px 26px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);line-height:1.7">
  数据来源：World Bank Open Data（<a href="https://api.worldbank.org" style="color:var(--accent)">api.worldbank.org</a>）、IMF WEO。
  地图着色所用数值为基于 World Bank / IMF 2022 年公开报告的近似值（单位见图例），用于可视化参考；点击国家可拉取 World Bank 实时最新值。
  底图：ECharts world GeoJSON。台湾数据列入统计，标注为「中国台湾」。
</footer>

<script src="vendor/data/world-geo.js"></script>

function fmtB(b){ if(b==null) return "—";
  const neg=b<0?"-":""; b=Math.abs(b);
  if(b>=1000) return neg+(b/1000).toFixed(2)+" 万亿美元";
  return neg+b.toFixed(1)+" 十亿美元";
}
function fmtT(t){ if(t==null) return "—"; return t.toFixed(2)+" 万亿美元"; }

    /* 构建维度筛选条：全部 + 10 个宏观维度；点击按维度过滤当前城市新闻 */
    function buildNewsFilter(){
      if(!newsFilter) return;
      var chips = [{ key:'all', cn:'全部' }].concat(DIMENSIONS);
      newsFilter.innerHTML = chips.map(function(c){
        return '<span class="chip' + (c.key === activeDimension ? ' active' : '') + '" data-dim="' + (c.key === 'all' ? 'all' : c.cn) + '">' + c.cn + '</span>';
      }).join('');
      newsFilter.querySelectorAll('.chip').forEach(function(el){
        el.addEventListener('click', function(){
          activeDimension = el.dataset.dim;
          newsFilter.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('active'); });
          el.classList.add('active');
          if(currentNewsNode) renderNewsList(currentNewsNode);
        });
      });

function cityTime(tz){
  try { return new Intl.DateTimeFormat('zh-CN', { timeZone: tz, hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date()); }
  catch(e){ return '--:--'; }
}

/* 切换城市：旧列表上移淡出 -> 刷新 -> 新列表下移淡入；reduced-motion 直接刷新 */
function updateNews(node, animate){
  currentNewsNode = node;
  renderNewsHeader(node);
  updateFoot();
  if(!animate){ renderNewsList(node); return; }
  var list = newsPanelList;
  list.classList.add('leaving');
  if(newsSwitchTimer) clearTimeout(newsSwitchTimer);
  newsSwitchTimer = setTimeout(function(){
    renderNewsList(node);
    list.classList.remove('leaving');
    list.classList.add('entering');
    void list.offsetWidth; // 强制回流，确保过渡触发
    requestAnimationFrame(function(){ list.classList.remove('entering'); });
  }, 300);
}
var newsSwitchTimer = null;
function newsImportance(item, node){
  var s = 0;
  (item.tags || []).forEach(function(t){ s += (TAG_WEIGHT[t] || 1); });
  if(node && typeof node.score === 'number') s += (node.score - 0.5) * 4; // 全球中心加权
  return s;
}
    /* V3.0 维度体系：10 个宏观维度（中文名 ↔ CSS key），用于新闻双标签与维度筛选 */
    var DIMENSIONS = [
      { key:'politics', cn:'政治' }, { key:'geopolitics', cn:'地缘军事' },
      { key:'monetary', cn:'货币政策' }, { key:'supply-chain', cn:'供应链物流' },
      { key:'free-trade', cn:'自贸区' }, { key:'tech', cn:'科技产业' },
      { key:'energy', cn:'能源大宗' }, { key:'industry', cn:'产业趋势' },
      { key:'crypto', cn:'虚拟货币' }, { key:'macro', cn:'宏观金融' }
    ];
    var DIM_KEY = { '政治':'politics','地缘军事':'geopolitics','货币政策':'monetary','供应链物流':'supply-chain','自贸区':'free-trade','科技产业':'tech','能源大宗':'energy','产业趋势':'industry','虚拟货币':'crypto','宏观金融':'macro' };
    var activeDimension = 'all';   /* 维度筛选：'all' 或某维度中文名 */
    var currentNewsNode = null;   /* 当前展示新闻的节点（供维度筛选重渲染） */

    function relTime(timeStr){
  if(!timeStr || timeStr.indexOf('直播') >= 0) return timeStr || '';
  var m = /^(\d{1,2}):(\d{2})$/.exec(timeStr);
  if(!m) return timeStr;
  var itemMin = parseInt(m[1],10)*60 + parseInt(m[2],10);
  var diff = new Date().getHours()*60 + new Date().getMinutes() - itemMin;
  if(diff < 0) diff = 0;
  if(diff < 1) return '刚刚';
  if(diff < 60) return diff + ' 分钟前';
  return Math.floor(diff/60) + ' 小时前';
}
function renderNewsHeader(node){
  if(!newsPanel) initNewsPanel();
  newsPanelCity.textContent = node.name;
  if(newsPanelSub) newsPanelSub.textContent = '金融热点 · 按重要度排序';
  var liveCount = node.news.filter(function(n){ return n.tags.indexOf('live') >= 0; }).length;
  newsPanelMeta.innerHTML =
    '<span class="city-clock">' + node.name + '时间 ' + cityTime(CITY_TZ[node.id]) + '</span>' +
    '<span>GFCI 全球金融中心排名 #' + node.rank + '</span>' +
    (liveCount ? '<span class="news-panel-live"><span class="live-dot"></span>' + liveCount + ' 直播中</span>' : '') +
    '<span class="demo-pill">演示数据</span>' +
    '<span class="realtime-pill"><span class="rt-dot"></span>实时</span>';
}
function renderNewsList(node){
  if(!node.news || !node.news.length){ renderNewsListSkeleton(); return; }
  // 维度筛选：无论选中哪个城市，新闻须同时满足「该城市」与「该维度」双重条件
  var filtered = (activeDimension === 'all') ? node.news : node.news.filter(function(n){ return (n.dimension || '宏观金融') === activeDimension; });
  if(!filtered.length){
    newsPanelList.innerHTML = '<div class="news-empty">该维度下暂无' + node.name + '相关热点<small>切换维度或城市查看其它资讯</small></div>';
    return;
  }
  var ranked = filtered
    .map(function(it, i){ return { it:it, i:i, imp:newsImportance(it, node) }; })
    .sort(function(a,b){ return (b.imp - a.imp) || (a.i - b.i); })
    .map(function(x){ return x.it; });
  newsPanelList.innerHTML = ranked.map(function(item, idx){
    var dimCn = item.dimension || '宏观金融';
    var dk = DIM_KEY[dimCn] || 'macro';
    var tag = (item.tags && item.tags[0]) || '';
    var tagLabel = { hot:'热门', live:'直播', policy:'政策', finance:'金融', industry:'产业', energy:'能源', alert:'预警', update:'更新', trade:'贸易', resource:'资源' }[tag] || tag;
    var rankCls = idx === 0 ? ' top top1' : (idx < 3 ? ' top' : '');
    return '<div class="news-item' + rankCls + '">' +
      '<div class="news-tags-row">' +
        '<span class="dimension-tag ' + dk + '">' + dimCn + '</span>' +
        (tagLabel ? '<span class="news-tag ' + tag + '">' + tagLabel + '</span>' : '') +
      '</div>' +
      '<div class="news-title"><span class="news-rank">#' + (idx+1) + '</span>' + item.title + '</div>' +
      '<div class="news-meta"><span>' + item.source + '</span>' +
      '<span class="news-time" data-time="' + item.time + '">' + relTime(item.time) + '</span></div></div>';
  }).join('');
}
function updateFoot(){
  if(!newsPanelFoot) return;
  var t = new Date();
  var p = function(n){ return String(n).padStart(2,'0'); };
  newsPanelFoot.textContent = '演示数据 · 最后更新 ' + p(t.getHours()) + ':' + p(t.getMinutes()) + ':' + p(t.getSeconds());
}

  newsPanelList.querySelectorAll('.news-time').forEach(function(el){
    var t = el.getAttribute('data-time');
    if(t) el.textContent = relTime(t);

}

/* ===== 地图渲染 ===== */
function renderMap(){
  var data = [];
  Object.keys(COUNTRY).forEach(function(en){
    var c = COUNTRY[en], mn = mapName(en), v = c[currentMetric];
    data.push({ name:mn, value:v, cn:c.cn, en:en });
  });
  var isCont = (currentMetric==='cont');
  var visual = isCont ? {
    type:'category',
    categories:Object.keys(CONT).map(function(k){return {name:CONT[k].name, value:k}; }),
    color:[COLORS.cont.AS,COLORS.cont.EU,COLORS.cont.NA,COLORS.cont.SA,COLORS.cont.AF,COLORS.cont.OC],
    dimension:0
  } : {
    type:'continuous',
    min:0,
    max:isCont ? undefined : (currentMetric==='fdi' ? 350 : 28),
    inRange:{ color: METRICS[currentMetric].grad },
    dimension:0
  };
  var series = [
    {
      type:'map', map:'world', geoIndex:0,
      data:data,
      selectedMode:false,
      itemStyle:{ areaColor:'#0e1a34', borderColor:'rgba(120,160,220,0.25)', borderWidth:0.6 },
      emphasis:{ itemStyle:{ areaColor:'#1c3466', borderColor:'rgba(79,209,227,0.6)', borderWidth:1.2 } },
      select:{ disabled:true }
    },
    {
      type:'effectScatter', coordinateSystem:'geo', geoIndex:0,
      data:CITY_NODES.map(function(c){ return {name:c.cn, value:[c.lng, c.lat, c.rank], id:c.id}; }),
      symbolSize:function(v){ return Math.max(8, 22 - v[2]*0.7); },
      showEffectOn:'render', rippleEffect:{ brushType:'stroke', scale:3, period:4 },
      itemStyle:{ color:COLORS.gold, borderColor:'#fff', borderWidth:1, shadowBlur:12, shadowColor:'rgba(255,214,102,0.6)' },
      label:{ show:false },
      emphasis:{ label:{ show:true, formatter:'{b}', color:'#fff', fontSize:13, fontWeight:'bold' },
                 itemStyle:{ color:COLORS.accent, borderColor:'#fff', borderWidth:2, shadowBlur:18, shadowColor:'rgba(79,209,227,0.9)' } },
      zlevel:2
    },
    {
      type:'lines', coordinateSystem:'geo', geoIndex:0,
      effect:{ show:true, period:3, trailLength:0.4, color:COLORS.accent, symbolSize:4 },
      lineStyle:{ color:'rgba(79,209,227,0.35)', width:1, curveness:0.2, opacity:0.8 },
      data:FLOW_PAIRS.map(function(pair){
        var a=CITY_BY_ID[pair[0]], b=CITY_BY_ID[pair[1]];
        return { coords:[[a.lng,a.lat],[b.lng,b.lat]], from:a.cn, to:b.cn };
      }),
      zlevel:1
    }
  ];
  chart.setOption({
    tooltip:{
      trigger:'item', backgroundColor:'rgba(10,18,38,0.95)', borderColor:'rgba(120,170,230,0.4)', textStyle:{ color:'#eaf1fb', fontSize:12 },
      formatter:function(p){
        if(p.seriesType==='effectScatter'){ var c=CITY_BY_NAME[p.name]; return '<b>'+c.cn+'</b> ('+c.en+')<br/>GFCI 排名 #'+c.rank+'<br/>'+c.desc; }
        if(p.seriesType==='lines'){ return p.data.from+' → '+p.data.to; }
        if(p.value==null) return p.name+'<br/>暂无数据';
        return '<b>'+p.name+'</b><br/>'+METRICS[currentMetric].label+'：'+METRICS[currentMetric].fmt(p.value);
      }
    },
    geo:{ map:'world', roam:true, layoutSize:'110%',
      itemStyle:{ areaColor:'#0e1a34', borderColor:'rgba(120,160,220,0.25)', borderWidth:0.6 },
      emphasis:{ itemStyle:{ areaColor:'#1c3466', borderColor:'rgba(79,209,227,0.6)', borderWidth:1.2 } },
      label:{ show:false }
    },
    visualMap:isCont ? undefined : {
      type:isCont?'category':'continuous', min:0, max:currentMetric==='fdi'?350:28,
      text:['高','低'], textStyle:{ color:'#9fb2cc', fontSize:10 },
      inRange:{ color:METRICS[currentMetric].grad },
      calculable:true, orient:'vertical', left:16, bottom:60, itemWidth:14, itemHeight:120
    },
    series:series
  }, true);
  if(activeCityId) applyCityHighlight();   // 指标切换后保持选中节点高亮
  // 更新图例
  var lg = document.getElementById('legend');
  if(isCont){
    lg.innerHTML='<div class="lt">按大洲分布</div>'+Object.keys(CONT).map(function(k){return '<div class="chip"><i style="background:'+CONT[k].color+'"></i>'+CONT[k].name+'</div>';}).join('');
  } else {
    lg.innerHTML='<div class="lt">'+METRICS[currentMetric].label+' ('+METRICS[currentMetric].unit+')</div>'+
      '<div class="bar-grad"></div>'+
      '<div class="scale"><span>'+(currentMetric==='fdi'?'0':'0')+'</span><span>'+(currentMetric==='fdi'?'350+':'28+')+'</span></div>';
  }
}

/* ===== 全球概览 ===== */
function showOverview(){
  selectedName=null;
  var totalFDI=0, totalGDP=0, cnt=0;
  Object.keys(COUNTRY).forEach(function(en){ var c=COUNTRY[en]; if(c.fdi!=null) totalFDI+=c.fdi; if(c.gdp!=null) totalGDP+=c.gdp; cnt++; });
  document.getElementById('sideTitle').textContent='全球概览';
  document.getElementById('sideBody').innerHTML=
    '<div class="placeholder">点击地图上的国家查看详细指标，或点击金色圆点查看全球金融中心城市。</div>'+
    '<div class="stat-row"><span>覆盖国家</span><b>'+cnt+'</b></div>'+
    '<div class="stat-row"><span>全球 FDI 净流入合计</span><b>'+fmtB(totalFDI)+'</b></div>'+
    '<div class="stat-row"><span>全球 GDP 合计</span><b>'+totalGDP.toFixed(1)+' 万亿美元</b></div>'+
    '<div class="stat-row"><span>金融中心节点</span><b>'+CITY_NODES.length+'</b></div>';
  clearActiveCity();   // 取消地图节点选中高亮
  showNewsEmpty();     // 新闻板块回到空状态（需求 4）
}

/* ===== 选中城市 ===== */
function selectCity(c){
  var firstSel = activeNodeId === null;
  selectedName=c.cn;
  document.getElementById('sideTitle').textContent=c.cn+' · 全球金融中心 #'+c.rank;
  document.getElementById('sideBody').innerHTML=
    '<div class="tag" style="display:inline-block;margin-bottom:10px">GFCI 排名 #'+c.rank+'</div>'+
    '<div class="placeholder">'+c.desc+'</div>'+
    '<div class="stat-row"><span>英文名</span><b>'+c.en+'</b></div>'+
    '<div class="stat-row"><span>坐标</span><b>'+c.lat.toFixed(2)+'°, '+c.lng.toFixed(2)+'°</b></div>';
  // 新闻板块联动：选中态 + 跨城过渡（首次选中不播放过渡，与 3D 一致）
  activeNodeId = c.id;
  setActiveCity(c.id);
  updateNews(c, !firstSel && !reducedMotion);
  if(window.innerWidth<=900) openSide();
}

/* ===== 选中国家 ===== */
function selectCountry(en){
  var c=COUNTRY[en]; if(!c) return;
  selectedName=c.cn;
  document.getElementById('sideTitle').textContent=c.cn;
  document.getElementById('sideBody').innerHTML=
    '<div class="tag" style="display:inline-block;margin-bottom:10px">'+CONT[c.cont].name+'</div>'+
    (c.g20?'<div class="tag" style="display:inline-block;margin-bottom:10px;margin-left:6px">G20 成员</div>':'')+
    '<div class="stat-row"><span>首都</span><b>'+c.cap+'</b></div>'+
    '<div class="stat-row"><span>跨境资金净流入 (FDI)</span><b>'+fmtB(c.fdi)+'</b></div>'+
    '<div class="stat-row"><span>经济总量 (GDP)</span><b>'+fmtT(c.gdp)+'</b></div>'+
    '<div class="stat-row"><span>大洲</span><b>'+CONT[c.cont].name+'</b></div>'+
    '<div class="src">数据来源：World Bank / IMF 2022 近似值</div>';
  if(window.innerWidth<=900) openSide();
}

function loadMap(){
  try{
    if(!window.WORLD_GEO_JSON){ throw new Error('no-geo'); }
    echarts.registerMap('world', window.WORLD_GEO_JSON);
    mapLoaded=true; renderMap();
    initNewsPanel();
    showOverview();
  }catch(e){
    document.getElementById('map').innerHTML='<div class="errbox">地图渲染失败：'+e.message+'</div>';
  }
}
const searchInput=document.getElementById('searchInput'), suggest=document.getElementById('suggest');
searchInput.addEventListener('input', function(){
  const q=searchInput.value.trim().toLowerCase(); suggest.innerHTML='';
  if(!q){ suggest.style.display='none'; return; }
  const items=[];
  Object.keys(COUNTRY).forEach(function(en){ const c=COUNTRY[en]; if(en.toLowerCase().indexOf(q)>=0 || c.cn.indexOf(q)>=0) items.push({kind:'country',key:en,cn:c.cn,en:en}); });
  CITY_NODES.forEach(function(c){ if(c.cn.indexOf(q)>=0 || c.en.toLowerCase().indexOf(q)>=0) items.push({kind:'city',key:c.id,cn:c.cn,en:c.en}); });
  if(!items.length){ suggest.style.display='none'; return; }
  suggest.style.display='block';
  suggest.innerHTML=items.slice(0,10).map(function(it){
    const tag = it.kind==='city' ? '<span class="en" style="color:var(--gold)">金融中心</span>' : '<span class="en">'+it.en+'</span>';
    return '<div data-kind="'+it.kind+'" data-key="'+it.key+'"><span>'+it.cn+'</span>'+tag+'</div>';
  }).join('');
  suggest.querySelectorAll('div').forEach(function(d){ d.addEventListener('click', function(){
    if(d.dataset.kind==='city'){ const c=CITY_BY_ID[d.dataset.key]; searchInput.value=c.cn; suggest.style.display='none'; selectCity(c); }
    else { searchInput.value=COUNTRY[d.dataset.key].cn; suggest.style.display='none'; selectCountry(d.dataset.key); }
  }); });
});
document.addEventListener('click', function(e){ if(!e.target.closest('.search')) suggest.style.display='none'; });

/* ===== 视图重置 ===== */
function resetView(){ selectedName=null; showOverview(); renderMap(); }

/* ===== 侧栏开关（移动端） ===== */
function openSide(){ document.getElementById('side').classList.add('open'); document.getElementById('mask').classList.add('open'); }
function closeSide(){ document.getElementById('side').classList.remove('open'); document.getElementById('mask').classList.remove('open'); }

document.getElementById('resetBtn').addEventListener('click', resetView);
document.getElementById('closeBtn').addEventListener('click', closeSide);
document.getElementById('mask').addEventListener('click', closeSide);
window.addEventListener('resize', function(){ if(mapLoaded) chart.resize(); });
loadMap();
</script>
</body>
</html>
