<title>可交互世界地图 · 全球资金流动</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  :root{
    --bg-1:#070d22; --bg-2:#0b1733; --bg-3:#101d3e;
    --panel:rgba(15,25,52,0.72); --border:rgba(120,160,220,0.16); --border-strong:rgba(120,170,230,0.38);
    --text:#eaf1fb; --muted:#9fb2cc; --faint:#6f86a8;
    --accent:#4fd1e3; --accent-2:#5b9bff; --gold:#ffd666; --good:#3fd29a; --warn:#ff9d6b;
    --base:#172339; --base-border:#2c3c5e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:radial-gradient(1200px 700px at 78% -10%, rgba(91,155,255,0.18), transparent 60%),
               radial-gradient(900px 600px at 10% 110%, rgba(79,209,227,0.14), transparent 55%),
               linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 45%,var(--bg-3) 100%);
    background-attachment:fixed; min-height:100vh; overflow-x:hidden;
  }
  /* 顶部 */
  header.top{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    padding:16px 26px;border-bottom:1px solid var(--border);
    background:rgba(8,14,32,0.55);backdrop-filter:blur(12px);position:relative;z-index:10;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:.5px;}
  .brand .sub{font-size:11px;color:var(--faint);margin-top:2px;}
  .search{position:relative;}
  .search input{
    width:260px;max-width:60vw;padding:9px 14px 9px 36px;border-radius:22px;
    border:1px solid var(--border-strong);background:rgba(10,18,38,0.7);color:var(--text);font-size:13px;outline:none;
    transition:.2s;
  }
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,209,227,0.15);}
  .search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;}
  .suggest{
    position:absolute;top:46px;left:0;right:0;background:rgba(10,18,38,0.97);border:1px solid var(--border-strong);
    border-radius:12px;overflow:hidden;z-index:30;box-shadow:0 18px 50px rgba(0,0,0,0.5);max-height:320px;overflow-y:auto;
  }
  .suggest div{padding:10px 14px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(120,160,220,0.08);}
  .suggest div:hover{background:rgba(79,209,227,0.12);}
  .suggest div .en{color:var(--faint);font-size:11px;}

  main{display:flex;gap:0;align-items:stretch;min-height:calc(100vh - 120px);}
  .map-wrap{flex:1;position:relative;min-height:62vh;}
  #map{width:100%;height:100%;min-height:420px;}

  /* 指标 Tab */
  .metrics{
    position:absolute;top:16px;left:16px;z-index:6;display:flex;gap:8px;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:7px;backdrop-filter:blur(8px);
  }
  .metrics button{
    border:none;background:transparent;color:var(--muted);font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.18s;white-space:nowrap;
  }
  .metrics button:hover{color:var(--text);}
  .metrics button.active{background:linear-gradient(90deg,rgba(79,209,227,.22),rgba(91,155,255,.22));color:#fff;box-shadow:inset 0 0 0 1px rgba(79,209,227,.4);}

  /* 动态图例 */
  .legend{
    position:absolute;left:16px;bottom:16px;z-index:6;background:var(--panel);
    border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);
    backdrop-filter:blur(8px);min-width:190px;
  }
  .legend .lt{font-size:11px;color:var(--faint);margin-bottom:7px;letter-spacing:.4px;}
  .legend .bar-grad{height:9px;border-radius:5px;margin:4px 0 5px;background:linear-gradient(90deg,#16243f,#234b8a,#2f8fd0,#54d6e8,#ffd666);}
  .legend .scale{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);}
  .legend .chip{display:flex;align-items:center;gap:6px;margin-top:4px;}
  .legend .chip i{width:11px;height:11px;border-radius:3px;display:inline-block;}

  .reset{
    position:absolute;right:16px;bottom:16px;z-index:6;padding:8px 14px;border-radius:20px;cursor:pointer;
    background:var(--panel);border:1px solid var(--border-strong);color:var(--accent);font-size:12px;backdrop-filter:blur(8px);transition:.18s;
  }
  .reset:hover{background:rgba(79,209,227,0.16);}

  /* 侧栏 */
  .side{
    width:372px;flex-shrink:0;border-left:1px solid var(--border);
    background:rgba(8,14,32,0.5);padding:20px;overflow-y:auto;
  }
  .side h2{font-size:16px;margin-bottom:4px;color:#bfe6f5;display:flex;align-items:center;gap:8px;}
  .side .tag{font-size:10px;color:var(--faint);border:1px solid var(--border);padding:2px 7px;border-radius:8px;}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed rgba(120,160,220,0.13);font-size:13px;gap:10px;}
  .stat-row span{color:var(--muted);}
  .stat-row b{color:var(--text);font-size:15px;text-align:right;}
  .badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;background:rgba(79,209,227,0.15);color:var(--accent);border:1px solid rgba(79,209,227,0.3);margin-top:8px;}
  .bar{height:7px;border-radius:5px;background:rgba(120,160,220,0.16);margin-top:7px;overflow:hidden;}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,#4fd1e3,#5b9bff);transition:width .8s cubic-bezier(.2,.8,.2,1);}
  .btn{margin-top:14px;width:100%;padding:10px;border:1px solid var(--border-strong);border-radius:10px;
    background:rgba(79,209,227,0.12);color:var(--accent);font-size:13px;cursor:pointer;transition:.18s;}
  .btn:hover{background:rgba(79,209,227,0.22);}
  .placeholder{color:var(--muted);font-size:13px;line-height:1.85;margin-top:8px;}

  /* 排名榜 */
  .rank-title{font-size:13px;color:var(--muted);margin:18px 0 8px;display:flex;justify-content:space-between;align-items:center;}
  .rank-title .dim{color:var(--faint);font-size:11px;}
  .rank{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:.16s;border:1px solid transparent;}
  .rank:hover{background:rgba(79,209,227,0.1);border-color:rgba(79,209,227,0.25);}
  .rank .no{width:20px;height:20px;border-radius:6px;background:rgba(120,160,220,0.16);color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rank.top1 .no{background:linear-gradient(135deg,#ffd666,#ffae3b);color:#3a2a00;}
  .rank.top2 .no{background:linear-gradient(135deg,#cfd8e6,#9fb0c8);color:#1a2233;}
  .rank.top3 .no{background:linear-gradient(135deg,#e0a06a,#c47e42);color:#2a1600;}
  .rank .nm{flex:1;font-size:13px;}
  .rank .nm small{color:var(--faint);font-size:10px;display:block;}
  .rank .val{font-size:13px;color:var(--accent-2);font-variant-numeric:tabular-nums;}
  .rank.active{background:rgba(91,155,255,0.16);border-color:rgba(91,155,255,0.4);}

  .src{font-size:11px;color:var(--faint);line-height:1.6;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}

  /* 移动端底部抽屉 */
  .drawer-mask{display:none;}
  @media (max-width:900px){
    main{flex-direction:column;}
    .side{width:100%;border-left:none;border-top:1px solid var(--border);max-height:none;}
    .map-wrap{min-height:56vh;}
    .side{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:40;max-height:64vh;border-top:1px solid var(--border-strong);
      border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,0.55);transform:translateY(100%);transition:transform .28s ease;}
    .side.open{transform:translateY(0);}
    .drawer-mask{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:35;opacity:0;pointer-events:none;transition:opacity .28s;}
    .drawer-mask.open{opacity:1;pointer-events:auto;}
    .side .close{display:block;}
  }
  .side .close{display:none;position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
  .errbox{display:flex;align-items:center;justify-content:center;height:100%;color:#ffb3b3;font-size:14px;text-align:center;padding:30px;line-height:1.8;}
</style>

<body>
<header class="top">
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>全球资金流动 · 可交互世界地图</h1>
      <div class="sub">点击国家查看跨境资本指标 · 滚轮缩放 / 拖拽平移 · 数据着色随指标切换</div>
    </div>
  </div>
  <div class="search">
    <span class="ic">🔍</span>
    <input id="searchInput" type="text" placeholder="搜索国家（中/英文，如 中国 / Japan）" autocomplete="off" />
    <div class="suggest" id="suggest" style="display:none"></div>
  </div>
</header>

<main>
  <div class="map-wrap">
    <div id="map"></div>

    <div class="metrics" id="metrics">
      <button data-m="fdi" class="active">跨境资本净流入</button>
      <button data-m="gdp">经济总量 GDP</button>
      <button data-m="cont">按大洲分布</button>
    </div>

    <div class="legend" id="legend"></div>
    <div class="reset" onclick="resetView()">↺ 重置视图</div>
  </div>

  <div class="drawer-mask" id="mask" onclick="closeSide()"></div>
  <aside class="side" id="side">
    <button class="close" onclick="closeSide()">×</button>
    <h2 id="sideTitle">全球概览</h2>
    <div id="sideBody"></div>
  </aside>
</main>

<footer style="padding:12px 26px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);line-height:1.7">
  数据来源：World Bank Open Data（<a href="https://api.worldbank.org" style="color:var(--accent)">api.worldbank.org</a>）、IMF WEO。

  底图：ECharts world GeoJSON。台湾标注为「中国台湾」。
</footer>

/* 外债存量后备（十亿美元，World Bank 2022 近似） */
const FALLBACK_DEBT = {
  USA:21000,CHN:2500,JPN:4500,DEU:6000,GBR:9000,FRA:7500,IND:620,RUS:380,CAN:2000,BRA:650,
  AUS:2100,KOR:680,ITA:2900,ESP:2600,NLD:4500,CHE:1900,MEX:480,ZAF:190,IDN:400,TUR:440,
  SAU:250,ARE:250,SGP:1500,THA:260,MYS:300
};

/* 数值格式化 */
function fmtB(b){ if(b==null) return "—";
  const neg=b<0?"-":""; b=Math.abs(b);
  if(b>=1000) return neg+(b/1000).toFixed(2)+" 万亿美元";
  return neg+b.toFixed(1)+" 十亿美元";
}
function fmtT(t){ if(t==null) return "—"; return t.toFixed(2)+" 万亿美元"; }

/* ===== 地图初始化 ===== */
const chart = echarts.init(document.getElementById('map'));
let mapLoaded=false, currentMetric='fdi', selectedName=null;

const METRICS = {
  fdi:{label:"跨境资本净流入 (FDI)",unit:"十亿美元",grad:['#16243f','#234b8a','#2f8fd0','#54d6e8','#ffd666'],
       fmt:v=>v==null?'—':fmtB(v)},
  gdp:{label:"经济总量 (GDP)",unit:"万亿美元",grad:['#16243f','#2d6db5','#3fd0c0','#ffd666'],
       fmt:v=>v==null?'—':fmtT(v)},
  cont:{label:"按大洲分布",unit:"",grad:Object.values(CONT).map(c=>c.color),
       fmt:v=>v==null?'—':(CONT[v]?CONT[v].name:v)}
};

function loadMap(){
  const url='https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/world.json';
  fetch(url).then(r=>{ if(!r.ok) throw new Error('map'); return r.json(); })
    .then(json=>{
      echarts.registerMap('world',json);
      mapLoaded=true; renderMap();
      chart.on('click', p=>{ if(p.name && COUNTRY[p.name]) selectCountry(p.name); });
      showOverview();
    })
    .catch(()=>{ document.getElementById('map').innerHTML='<div class="errbox">世界地图数据加载失败（可能为网络 / CDN 限制）。<br>请检查网络后刷新页面重试。</div>'; });
}

/* 构建 series 数据 */
function buildData(metric){
  if(metric==='cont'){
    return Object.keys(COUNTRY).map(en=>({name:en, value:COUNTRY[en].cont}));
  }
  return Object.keys(COUNTRY).map(en=>({name:en, value:COUNTRY[en][metric]}));
}
function metricMax(metric){ return Math.max(...Object.values(COUNTRY).map(c=>c[metric]||0)); }

function renderMap(){
  if(!mapLoaded) return;
  const m=METRICS[currentMetric];
  let visualMap;
  if(currentMetric==='cont'){
    visualMap={ type:'piecewise', show:false, dimension:0,
      pieces:Object.keys(CONT).map(k=>({value:k,label:CONT[k].name,color:CONT[k].color})) };
  }else{
    visualMap={ type:'continuous', show:false, min:0, max:metricMax(currentMetric),
      inRange:{color:m.grad}, outOfRange:{color:'#172339'} };
  }
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{
      trigger:'item',
      backgroundColor:'rgba(11,20,42,0.96)', borderColor:'#3a5a8a',
      textStyle:{color:'#eaf1fb',fontSize:13},
      formatter:(p)=>{
        const c=COUNTRY[p.name];
        if(!c) return `<b>${p.name}</b><br><span style="color:#9fb2cc">暂无着色数据</span>`;
        const val = currentMetric==='cont'? CONT[c.cont].name : m.fmt(c[currentMetric]);
        return `<b>${c.cn}</b> <span style="color:#9fb2cc">${p.name}</span><br>`+
               `所属大洲：${CONT[c.cont].name}<br>`+
               `首都：${c.cap}<br>`+
               `${m.label}：<b style="color:#54d6e8">${val}${m.unit?(' '+m.unit):''}</b>`;
      }
    },
    visualMap:visualMap,
    series:[{
      name:'world', type:'map', map:'world', roam:true, selectedMode:'single',
      scaleLimit:{min:1,max:9},
      itemStyle:{ areaColor:'#172339', borderColor:'#2c3c5e', borderWidth:0.5 },
      emphasis:{ label:{show:false},
        itemStyle:{ areaColor:'#4fd1e3', borderColor:'#ffffff', borderWidth:1.2, shadowBlur:18, shadowColor:'rgba(79,209,227,0.6)' } },
      select:{ label:{show:false},
        itemStyle:{ areaColor:'#ffd666', borderColor:'#fff', borderWidth:1.4, shadowBlur:22, shadowColor:'rgba(255,214,102,0.7)' } },
      data:buildData(currentMetric)
    }]
  }, {replaceMerge:['series','visualMap']});
  renderLegend();
  if(selectedName) chart.dispatchAction({type:'select', seriesIndex:0, name:selectedName});
}

function renderLegend(){
  const m=METRICS[currentMetric];
  const el=document.getElementById('legend');
  if(currentMetric==='cont'){
    el.innerHTML='<div class="lt">大洲图例</div>'+
      Object.keys(CONT).map(k=>`<div class="chip"><i style="background:${CONT[k].color}"></i>${CONT[k].name}</div>`).join('');
  }else{
    const max=metricMax(currentMetric);
    el.innerHTML=`<div class="lt">${m.label}（${m.unit||''}）</div>`+
      `<div class="bar-grad" style="background:linear-gradient(90deg,${m.grad.join(',')})"></div>`+
      `<div class="scale"><span>0</span><span>${ (currentMetric==='gdp'? max.toFixed(1): Math.round(max)) }</span></div>`+
      `<div class="chip" style="margin-top:6px"><i style="background:#172339"></i>无数据 / 未收录</div>`;
  }
}

/* ===== 指标切换 ===== */
document.getElementById('metrics').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  document.querySelectorAll('#metrics button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  currentMetric=b.dataset.m;
  renderMap();
  if(selectedName) showDetail(selectedName); else showOverview();
});

/* ===== 选中 / 详情 ===== */
function selectCountry(en){
  if(selectedName && selectedName!==en) chart.dispatchAction({type:'unselect', seriesIndex:0, name:selectedName});
  selectedName=en;
  chart.dispatchAction({type:'select', seriesIndex:0, name:en});
  showDetail(en);
  openSide();
  // 排名项高亮
  document.querySelectorAll('.rank').forEach(r=>r.classList.toggle('active', r.dataset.en===en));
}
function showDetail(en){
  const c=COUNTRY[en]; if(!c) return;
  const iso=WB_ISO[en];
  const g20=c.g20?'是':'否';
  document.getElementById('sideTitle').textContent=c.cn;
  const body=document.getElementById('sideBody');
  body.innerHTML=`
    <div class="stat-row"><span>英文名称</span><b style="font-size:13px;color:var(--muted)">${en}</b></div>
    <div class="stat-row"><span>所属大洲</span><b>${CONT[c.cont].name}</b></div>
    <div class="stat-row"><span>首都</span><b>${c.cap}</b></div>
    <div class="stat-row"><span>是否 G20</span><b>${g20}</b></div>
    <div style="height:10px"></div>
    <div class="stat-row"><span>跨境资本净流入 (FDI)</span><b id="d-fdi">${fmtB(c.fdi)}</b></div>
    <div class="bar"><span id="d-fdi-bar" style="width:${Math.max(4,Math.min(100,(Math.max(0,c.fdi)/metricMax('fdi'))*100))}%"></span></div>
    <div class="stat-row" style="margin-top:8px"><span>经济总量 (GDP)</span><b id="d-gdp">${fmtT(c.gdp)}</b></div>
    <div class="bar"><span id="d-gdp-bar" style="width:${Math.max(4,Math.min(100,(c.gdp/metricMax('gdp'))*100))}%"></span></div>
    <div class="stat-row" style="margin-top:8px"><span>外债存量总额</span><b id="d-debt">获取中…</b></div>
    <div style="margin-top:8px"><span class="badge" id="d-badge">World Bank 获取中…</span></div>
    <div style="margin-top:10px;font-size:11px;color:var(--faint);line-height:1.6">
      基础指标为 World Bank / IMF 2022 公开近似值，用于快速参考；外债存量尝试实时拉取最新值。
      ${iso?('ISO3: '+iso):''}
    </div>
    <button class="btn" onclick="refreshLive('${en}')">⟳ 刷新该国外债实时数据</button>
  `;
  if(iso) loadDebt(iso); else { document.getElementById('d-debt').textContent="暂无"; document.getElementById('d-badge').textContent="无公开编码"; }
}

/* 实时拉取外债存量（World Bank） */
async function loadDebt(iso, badgeOverride){
  const el=document.getElementById('d-debt'), badge=document.getElementById('d-badge');
  if(!el) return;
  el.textContent="获取中…";
  const fb=FALLBACK_DEBT[iso];
  const url=`https://api.worldbank.org/v2/country/${iso}/indicator/DT.DOD.DPPG.CD?format=json&date=2018:2023&per_page=100`;
  try{
    const res=await fetch(url); if(!res.ok) throw 0;
    const d=await res.json(); if(!d[1]) throw 0;
    let best=null; d[1].forEach(o=>{ if(o.value!=null && (!best|| +o.date>+best.date)) best={date:o.date,value:o.value}; });
    if(!best) throw 0;
    animateValue(el, best.value/1e9, v=>fmtB(v));
    if(badge){ badge.textContent="World Bank 实时 ✓ "+best.date; badge.style.background="rgba(63,210,154,.15)"; badge.style.color="var(--good)"; badge.style.borderColor="rgba(63,210,154,.3)"; }
  }catch(e){
    if(fb){ el.textContent=fmtB(fb); if(badge){ badge.textContent="后备·WB 2022 近似"; } }
    else { el.textContent="暂无公开数据"; if(badge){ badge.textContent="无公开数据"; } }
  }
}
/* 供按钮调用：刷新外债 */
function refreshLive(en){ const iso=WB_ISO[en]; if(iso) loadDebt(iso, document.getElementById('d-badge')); }

/* 计数动画 */
function animateValue(el, to, fmt){
  const dur=700, t0=performance.now();
  const from=0;
  function step(t){ const k=Math.min(1,(t-t0)/dur); const v=from+(to-from)*(1-Math.pow(1-k,3));
    el.textContent=fmt(v); if(k<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

/* ===== 概览 + 排名榜 ===== */
function showOverview(){
  if(selectedName) chart.dispatchAction({type:'unselect', seriesIndex:0, name:selectedName});
  selectedName=null;
  document.getElementById('sideTitle').textContent='全球概览';
  const m=METRICS[currentMetric];
  const body=document.getElementById('sideBody');
  if(currentMetric==='cont'){
    const agg={};
    Object.keys(COUNTRY).forEach(en=>{ const c=COUNTRY[en]; if(!agg[c.cont]) agg[c.cont]={fdi:0,n:0}; agg[c.cont].fdi+=Math.max(0,c.fdi); agg[c.cont].n++; });
    const arr=Object.keys(agg).sort((a,b)=>agg[b].fdi-agg[a].fdi);
    const html=arr.map((k,i)=>`<div class="rank ${i<3?('top'+(i+1)):''}" data-cont="${k}" style="cursor:default">
        <div class="no">${i+1}</div>
        <div class="nm"><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:${CONT[k].color};margin-right:6px"></span>${CONT[k].name}<small>${agg[k].n} 国 · 净流入合计</small></div>
        <div class="val">${fmtB(agg[k].fdi)}</div>
      </div>`).join('');
    body.innerHTML=`
      <div class="placeholder">地图按「<b style="color:var(--accent)">${m.label}</b>」着色（六大洲配色见左下角图例）。下方为各洲跨境资本净流入合计排名。</div>
      <div class="rank-title"><span>🌍 大洲净流入合计</span><span class="dim">十亿美元</span></div>
      <div id="rankList">${html}</div>
      <div class="src">着色数值为 World Bank / IMF 2022 公开近似值，仅作可视化参考；底图版权：ECharts world GeoJSON。</div>`;
  }else{
    const ranked=Object.keys(COUNTRY).filter(en=>COUNTRY[en][currentMetric]!=null)
      .sort((a,b)=>COUNTRY[b][currentMetric]-COUNTRY[a][currentMetric]).slice(0,12);
    body.innerHTML=`
      <div class="placeholder">地图按「<b style="color:var(--accent)">${m.label}</b>」着色。
      悬停查看数值，点击国家查看详情，或在下方排名榜中快速定位。</div>
      <div class="rank-title"><span>💡 排名榜 · Top 12</span><span class="dim">${m.label}${m.unit?(' ('+m.unit+')'):''}</span></div>
      <div id="rankList">${ranked.map((en,i)=>rankRow(en,i)).join('')}</div>
      <div class="src">着色数值为 World Bank / IMF 2022 公开近似值，仅作可视化参考；点击国家可进一步拉取 World Bank 实时外债数据。
      底图版权：ECharts world GeoJSON。</div>`;
  }
  bindRank();
}
function rankRow(en,i){
  const c=COUNTRY[en]; const v=c[currentMetric];
  const cls=i<3?('top'+(i+1)):'';
  const valTxt=currentMetric==='cont'?CONT[c.cont].name:METRICS[currentMetric].fmt(v);
  return `<div class="rank ${cls}" data-en="${en}">
    <div class="no">${i+1}</div>
    <div class="nm">${c.cn}<small>${en}</small></div>
    <div class="val">${valTxt}</div>
  </div>`;
}
function bindRank(){
  document.querySelectorAll('#rankList .rank').forEach(row=>{
    const en=row.dataset.en; if(!en) return;
    row.addEventListener('click',()=>selectCountry(en));
    row.addEventListener('mouseenter',()=>{ if(mapLoaded) chart.dispatchAction({type:'highlight', seriesIndex:0, name:en}); });
    row.addEventListener('mouseleave',()=>{ if(mapLoaded) chart.dispatchAction({type:'downplay', seriesIndex:0, name:en}); });
  });
}

/* ===== 搜索 ===== */
const searchInput=document.getElementById('searchInput'), suggest=document.getElementById('suggest');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase(); suggest.innerHTML='';
  if(!q){ suggest.style.display='none'; return; }
  const hits=Object.keys(COUNTRY).filter(en=>{
    const c=COUNTRY[en]; return en.toLowerCase().includes(q)||c.cn.includes(q);
  }).slice(0,8);
  if(!hits.length){ suggest.style.display='none'; return; }
  suggest.style.display='block';
  suggest.innerHTML=hits.map(en=>`<div data-en="${en}"><span>${COUNTRY[en].cn}</span><span class="en">${en}</span></div>`).join('');
  suggest.querySelectorAll('div').forEach(d=>d.addEventListener('click',()=>{
    searchInput.value=COUNTRY[d.dataset.en].cn; suggest.style.display='none'; selectCountry(d.dataset.en);
  }));
});
document.addEventListener('click',e=>{ if(!e.target.closest('.search')) suggest.style.display='none'; });

/* ===== 视图重置 ===== */
function resetView(){ selectedName=null; showOverview(); renderMap(); }

/* ===== 侧栏开关（移动端） ===== */
function openSide(){ document.getElementById('side').classList.add('open'); document.getElementById('mask').classList.add('open'); }
function closeSide(){ document.getElementById('side').classList.remove('open'); document.getElementById('mask').classList.remove('open'); }

window.addEventListener('resize',()=>{ if(mapLoaded) chart.resize(); });
loadMap();
</script>
</body>
</html>
